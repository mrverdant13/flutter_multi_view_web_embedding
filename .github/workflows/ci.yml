name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  dart:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up FVM
        uses: ./.github/actions/fvm-setup

      - name: Install Flutter via FVM
        run: |
          fvm install
          fvm flutter --version

      - name: Activate Melos
        run: dart pub global activate melos

      - name: Bootstrap
        run: melos bootstrap

      - name: Check formatting
        run: melos run format.ci

      - name: Analyze
        run: melos run analyze.ci

  typescript:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: apps/widgets_preview/package-lock.json

      - name: Install dependencies
        working-directory: apps/widgets_preview
        run: npm ci

      - name: Type check
        working-directory: apps/widgets_preview
        run: npm run typecheck
