name: FVM + Flutter + Dart Setup
description: Installs FVM, installs the target Flutter version, and makes `flutter` and `dart` globally available

runs:
  using: composite
  steps:
    - name: Install FVM
      shell: bash
      run: curl -fsSL https://fvm.app/install.sh | bash
    - name: Add FVM to PATH
      shell: bash
      run: echo "$HOME/fvm/bin" >> "$GITHUB_PATH"
    - name: Print FVM version
      shell: bash
      run: fvm --version
    - name: Install Flutter via FVM
      shell: bash
      run: fvm install
    - name: Add `flutter` and `dart` to PATH
      shell: bash
      run: echo "./.fvm/flutter_sdk/bin" >> "$GITHUB_PATH"
    - name: Print Flutter version
      shell: bash
      run: flutter --version
    - name: Print Dart version
      shell: bash
      run: dart --version
