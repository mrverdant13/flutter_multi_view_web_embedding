<!--
  This file is used to run and debug the Tap Burst as a standalone app.
  It is not required for production.
-->
<!DOCTYPE html>
<html lang="en">

<head>
  <base href="$FLUTTER_BASE_HREF">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tap Burst</title>
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #0D0D1A;
    }
  </style>
</head>

<body>
  <!--
    Since `flutter_bootstrap.js` is absent, Flutter will generate it, not only
    providing the Flutter engine loader (`_flutter.loader`), but also
    automatically mounting the Flutter app into the body element.
  -->
  <script src="flutter_bootstrap.js" async></script>
</body>

</html>
