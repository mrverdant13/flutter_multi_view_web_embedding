<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Flutter Web Embedding</title>
  <link rel="stylesheet" href="/src/style.css">
</head>
<body>
  <header class="header">
    <h1>Flutter Web Embedding</h1>
    <p>Interactive Flutter widgets embedded in a vanilla web page via the multi-view API</p>
  </header>

  <main class="grid">
    <article class="card">
      <div class="card-header">
        <span class="card-tag">tap_burst</span>
        <h2>Tap Burst</h2>
        <p>Tap anywhere inside the widget to create animated particle bursts</p>
      </div>
      <div class="views" id="tap-burst-views"></div>
      <div class="card-footer">
        <button class="btn" id="tap-burst-add">+ Add view</button>
      </div>
    </article>

    <article class="card">
      <div class="card-header">
        <span class="card-tag">color_mixer</span>
        <h2>Color Mixer</h2>
        <p>Drag the RGB sliders to blend your own color in real time</p>
      </div>
      <div class="views" id="color-mixer-views"></div>
      <div class="card-footer">
        <button class="btn" id="color-mixer-add">+ Add view</button>
      </div>
    </article>
  </main>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
