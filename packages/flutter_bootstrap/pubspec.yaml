name: flutter_bootstrap
description: >-
  Minimal Flutter app whose sole purpose is to produce the shared
  flutter_bootstrap.js (Flutter engine loader) for multi-view web embedding.
publish_to: none
version: 0.1.0+1

environment:
  flutter: ">=3.41.1 <4.0.0"
  sdk: ">=3.6.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  very_good_analysis: ^7.0.0

flutter:
  uses-material-design: false
